<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Panel podglądu — CandyBloomCandles</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .admin-wrap{padding:40px 6vw;max-width:1250px;margin:auto}
    .admin-card{background:var(--paper);border:1px solid var(--line);border-radius:28px;padding:24px;box-shadow:var(--shadow);margin-bottom:24px}
    .admin-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px}
    .preview-row{display:grid;grid-template-columns:280px 1fr;gap:20px;align-items:start}
    .admin-preview{border:1px solid var(--line);border-radius:24px;overflow:hidden;background:#fff}
    .admin-preview .frame{height:300px;overflow:hidden;background:var(--beige)}
    .admin-preview img{width:100%;height:100%;object-fit:cover}
    .admin-preview div.content{padding:16px}
    .admin-note{color:var(--muted);line-height:1.7}
    .control-grid{display:grid;gap:12px}
    .codebox{font-family:monospace;background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px;white-space:pre-wrap;color:var(--brown)}
    .range-label{display:flex;justify-content:space-between;gap:12px}
    @media(max-width:980px){.admin-grid,.preview-row{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header class="site-header">
    <a class="logo" href="/">CandyBloomCandles</a>
    <nav><a href="/">Wróć do strony</a></nav>
  </header>

  <main class="admin-wrap">
    <section class="admin-card">
      <p class="eyebrow">Panel pomocniczy</p>
      <h1>Podgląd kadrowania zdjęć</h1>
      <p class="admin-note">Tutaj sprawdzisz, jak zdjęcie będzie wyglądać w dużym kafelku produktu. Przesuwaj zdjęcie i ustaw przybliżenie. Potem przepisz wartości <strong>imagePosition</strong> i <strong>imageZoom</strong> do danego produktu w <strong>data/products.json</strong>.</p>
    </section>

    <section class="admin-grid" id="adminGrid"></section>
  </main>

  <script>
    const posLabel = (x,y) => `${x}% ${y}%`;

    fetch('/data/products.json')
      .then(r => r.json())
      .then(data => {
        document.getElementById('adminGrid').innerHTML = data.products.map((p, idx) => {
          const [xRaw, yRaw] = (p.imagePosition || 'center center').split(' ');
          const x = xRaw === 'center' ? 50 : parseInt(xRaw) || 50;
          const y = yRaw === 'center' ? 50 : parseInt(yRaw) || 50;
          const zoom = Number(p.imageZoom || 1);

          return `
            <article class="admin-card preview-row" data-index="${idx}">
              <div class="admin-preview">
                <div class="frame">
                  <img id="img-${idx}" src="${p.image}" alt="${p.name}" style="object-position:${x}% ${y}%;transform:scale(${zoom});">
                </div>
                <div class="content">
                  <p class="eyebrow">${p.category}</p>
                  <h3>${p.name}</h3>
                  <strong>${p.price} zł</strong>
                </div>
              </div>

              <div class="control-grid">
                <h3>Ustaw kadr zdjęcia</h3>

                <label>
                  <span class="range-label"><strong>Przesunięcie poziome</strong><span id="xVal-${idx}">${x}%</span></span>
                  <input type="range" min="0" max="100" value="${x}" data-type="x" data-index="${idx}">
                </label>

                <label>
                  <span class="range-label"><strong>Przesunięcie pionowe</strong><span id="yVal-${idx}">${y}%</span></span>
                  <input type="range" min="0" max="100" value="${y}" data-type="y" data-index="${idx}">
                </label>

                <label>
                  <span class="range-label"><strong>Przybliżenie</strong><span id="zoomVal-${idx}">${zoom}</span></span>
                  <input type="range" min="1" max="1.6" step="0.01" value="${zoom}" data-type="zoom" data-index="${idx}">
                </label>

                <div class="codebox" id="code-${idx}">"imagePosition": "${x}% ${y}%",
"imageZoom": ${zoom}</div>
              </div>
            </article>
          `;
        }).join('');

        const state = data.products.map(p => {
          const [xRaw, yRaw] = (p.imagePosition || 'center center').split(' ');
          return {
            x: xRaw === 'center' ? 50 : parseInt(xRaw) || 50,
            y: yRaw === 'center' ? 50 : parseInt(yRaw) || 50,
            zoom: Number(p.imageZoom || 1)
          }
        });

        document.querySelectorAll('input[type="range"]').forEach(input => {
          input.addEventListener('input', e => {
            const idx = Number(e.target.dataset.index);
            const type = e.target.dataset.type;
            state[idx][type] = type === 'zoom' ? Number(e.target.value) : Number(e.target.value);

            const img = document.getElementById(`img-${idx}`);
            img.style.objectPosition = `${state[idx].x}% ${state[idx].y}%`;
            img.style.transform = `scale(${state[idx].zoom})`;

            document.getElementById(`xVal-${idx}`).textContent = `${state[idx].x}%`;
            document.getElementById(`yVal-${idx}`).textContent = `${state[idx].y}%`;
            document.getElementById(`zoomVal-${idx}`).textContent = state[idx].zoom.toFixed(2);
            document.getElementById(`code-${idx}`).textContent = `"imagePosition": "${state[idx].x}% ${state[idx].y}%",
"imageZoom": ${state[idx].zoom.toFixed(2)}`;
          });
        });
      });
  </script>
</body>
</html>
